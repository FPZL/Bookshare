<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Adicionar Livro</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>
</head>
<body>
  <header>
    <h1>Adicionar Livro</h1>
    <a href="index.html" class="btn">Voltar</a>
  </header>

  <form id="book-form">
    <input type="text" id="titulo" placeholder="Título do livro" required>
    <textarea id="descricao" placeholder="Descrição" required></textarea>
    <input type="file" id="foto" accept="image/*" required>
    <button type="submit" class="btn">Salvar</button>
  </form>

  <script src="add.js"></script>
</body>
</html>
